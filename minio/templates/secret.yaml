{{- if .Values.accessKey.create }}
apiVersion: v1
kind: Secret
type: kubernetes.io/opaque
metadata:
  name: {{ .Values.accessKey.secretName }}
data:
  accessKeyId: {{ .Values.accessKey.accessKeyIdBase64 }}
  secretAccessKey: {{ .Values.accessKey.secretAccessKeyBase64 }}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.cert.certificateName }}
spec:
  secretName: {{ .Values.cert.secretName }}
  usages:
    - "digital signature"
    - "key encipherment"
  dnsNames:
    - {{ printf "%s-api" (include "minio.fullname" .) }}
    - {{ printf "%s-console" (include "minio.fullname" .) }}
    - {{ printf "%s-api.%s" (include "minio.fullname" .) (include "minio.svcDomainSuffix" .) }}
    - {{ printf "%s-console.%s" (include "minio.fullname" .) (include "minio.svcDomainSuffix" .)}}
    - {{ printf "*.%s-headless.%s" (include "minio.fullname" .) (include "minio.svcDomainSuffix" .) | quote }}
  # - "minio-data.s3.svc.cluster.local"
  # - "minio-console.s3.svc.cluster.local"
  # - "*.minio-headless.s3.svc.cluster.local"
  {{- if .Values.cert.ipAddresses }}
  ipAddresses:
  {{- toYaml .Values.cert.ipAddresses | nindent 2 }}
  {{- end }}
  issuerRef:
    name: akley-common-issuer
    kind: ClusterIssuer
