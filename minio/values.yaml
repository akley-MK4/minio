# Default values for minio.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

k8sClusterDomain: cluster.local

clusterMode:
  enabled: true
  # Set the number of MinIO instances to run in a cluster.
  replicas: 2

image:
  repository: quay.io/minio/minio
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "RELEASE.2025-09-07T16-13-09Z"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

gateway:
  enabled: true
  # If true, the HTTPRoute resource will be created to route traffic to the MinIO console.
  port: 30737

service:
  api:
    type: NodePort
    port: 9000
    nodePort: 32002
  console:
    type: ClusterIP
    port: 9200
    nodePort: 32003

resources:
  limits:
    cpu: 100m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

accessKeyName: "minio-aws-keys"

cert:
  certificateName: "minio-cert"
  secretName: "minio-tls"
  casMountPath: "/etc/minio/certs/CAs"
  certsMountPath: "/etc/minio/certs"
  ipAddresses:
  - "172.0.3.3"

storage:
  pvcName: "minio-data"
  mountPath: "/data"
  storageClassName: "local-path"
  accessMode: ReadWriteOnce
  size: 50Gi

nodeSelector: {}

tolerations: []

affinity: {}
